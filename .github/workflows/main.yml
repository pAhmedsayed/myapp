name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to server and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 34.201.107.190
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/myapp
            git pull
            docker build -t myapp .
            docker stop $(docker ps -q) || true
            docker run -d -p 80:80 myapp
